services:
  - type: web
    name: cookbook
    env: python
    plan: free  # ← ЭТО ГЛАВНОЕ!
    region: frankfurt
    buildCommand: |
      cd Backend && pip install -r requirements.txt
      cd ../frontend && npm install && npm run build
    startCommand: cd Backend && gunicorn app:app
    envVars:
      - key: DATABASE_URL
        value: sqlite:///cookbook.db
    healthCheckPath: /